<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lily's Notetaker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Karla:wght@400;500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F1F6;        /* pale lilac-grey desk */
  --card:#FFFFFF;
  --ink:#2E2A3B;          /* deep plum charcoal */
  --ink-soft:#6E687F;
  --line:#E2DEEA;
  --accent:#C08497;       /* dusty rose */
  --accent-deep:#9E6575;
  --butter:#FDF3B4;
  --mint:#CDEBD8;
  --sky:#CFE4F7;
  --blush:#F9D8DF;
  --lilac:#E3D7F3;
  --shadow:0 1px 2px rgba(46,42,59,.06), 0 8px 24px rgba(46,42,59,.08);
  --shadow-lift:0 2px 4px rgba(46,42,59,.08), 0 14px 34px rgba(46,42,59,.14);
  --r:14px;
  --display:'Fraunces', Georgia, 'Times New Roman', serif;
  --ui:'Karla', -apple-system, 'Segoe UI', sans-serif;
  --read:'Source Serif 4', Charter, Georgia, serif;
  --mono:'Spline Sans Mono', ui-monospace, Menlo, monospace;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:var(--ui); color:var(--ink); background:var(--paper);
  background-image:radial-gradient(rgba(192,132,151,.10) 1px, transparent 1px);
  background-size:22px 22px;
  -webkit-font-smoothing:antialiased;
}
button{font-family:var(--ui); cursor:pointer; border:none; background:none; color:inherit}
input,textarea,select{font-family:var(--ui); color:var(--ink); font-size:14px}
::selection{background:var(--lilac)}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px}

/* ---------- app shell ---------- */
.topbar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; gap:14px;
  padding:14px 22px; background:rgba(243,241,246,.9); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.wordmark{font-family:var(--display); font-weight:600; font-size:21px; letter-spacing:.2px; cursor:pointer; display:flex; align-items:baseline; gap:8px}
.wordmark em{font-style:italic; font-weight:400}
.wordmark .tab-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block;transform:translateY(-1px)}
.topbar .spacer{flex:1}
.crumb{font-size:13px; color:var(--ink-soft); max-width:38vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 15px; border-radius:999px; font-size:14px; font-weight:500;
  background:var(--card); border:1px solid var(--line); box-shadow:0 1px 2px rgba(46,42,59,.05);
  transition:transform .12s ease, box-shadow .12s ease;
}
.btn:hover{transform:translateY(-1px); box-shadow:var(--shadow)}
.btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
.btn.primary:hover{background:var(--accent-deep)}
.btn.small{padding:6px 11px; font-size:13px}
.btn.ghost{background:transparent; border-color:transparent; box-shadow:none; color:var(--ink-soft)}
.btn.ghost:hover{color:var(--ink); transform:none; box-shadow:none}

/* ---------- library ---------- */
.library{max-width:1060px; margin:0 auto; padding:38px 22px 90px}
.lib-head{display:flex; align-items:flex-end; gap:18px; flex-wrap:wrap; margin-bottom:8px}
.lib-title{font-family:var(--display); font-size:clamp(30px,4.4vw,44px); font-weight:600; line-height:1.05}
.lib-title em{font-style:italic; font-weight:400; color:var(--accent-deep)}
.lib-sub{color:var(--ink-soft); font-size:14px; margin-top:8px; max-width:52ch}
.lib-tools{display:flex; gap:10px; align-items:center; margin:26px 0 18px; flex-wrap:wrap}
.search{
  flex:1; min-width:220px; display:flex; align-items:center; gap:8px;
  background:var(--card); border:1px solid var(--line); border-radius:999px; padding:9px 16px;
}
.search input{border:none; outline:none; flex:1; background:transparent; font-size:14px}
.filter-chip{
  font-size:12.5px; padding:6px 12px; border-radius:999px; border:1px solid var(--line);
  background:var(--card); color:var(--ink-soft);
}
.filter-chip.on{background:var(--lilac); border-color:var(--accent); color:var(--accent-deep); font-weight:700}
.stats-line{font-family:var(--mono); font-size:12px; color:var(--ink-soft); margin-bottom:14px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--r);
  padding:18px 18px 14px; box-shadow:0 1px 2px rgba(46,42,59,.04);
  display:flex; flex-direction:column; gap:10px; cursor:pointer; position:relative;
  transition:transform .14s ease, box-shadow .14s ease;
}
.card:hover{transform:translateY(-3px); box-shadow:var(--shadow-lift)}
.card .tape{
  position:absolute; top:-9px; left:22px; width:64px; height:18px; border-radius:2px;
  transform:rotate(-2deg); opacity:.85;
}
.card h3{font-family:var(--display); font-size:18px; font-weight:600; line-height:1.28}
.card .src{font-size:12.5px; color:var(--ink-soft)}
.card .meta{display:flex; gap:12px; font-family:var(--mono); font-size:11.5px; color:var(--ink-soft); margin-top:auto}
.card .meta b{color:var(--ink); font-weight:500}
.tagrow{display:flex; gap:6px; flex-wrap:wrap}
.tag{font-size:11px; font-weight:700; letter-spacing:.03em; padding:3px 9px; border-radius:999px; background:var(--lilac); color:var(--accent-deep)}
.folder-row{display:flex; gap:12px; flex-wrap:wrap; margin:4px 0 20px}
.folder-pill{
  position:relative; display:inline-flex; align-items:center; gap:7px;
  font-family:var(--ui); background:rgba(192,132,151,.14); color:var(--accent-deep); font-size:12.5px; font-weight:700;
  padding:8px 14px 8px 12px; border-radius:3px 10px 10px 10px; cursor:pointer;
  border:1px solid rgba(192,132,151,.28);
  transition:transform .12s ease, box-shadow .12s ease;
}
.folder-pill::before{
  content:""; position:absolute; top:-6px; left:-1px; width:36%; height:7px;
  background:rgba(192,132,151,.14); border:1px solid rgba(192,132,151,.28); border-bottom:none;
  border-radius:4px 4px 0 0;
}
.folder-pill .ficon{width:14px; height:14px; flex-shrink:0}
.folder-pill:hover{transform:translateY(-1px)}
.folder-pill.on{box-shadow:0 0 0 2px var(--accent-deep) inset}
.folder-pill .count{font-family:var(--mono); font-size:10.5px; font-weight:400; opacity:.75}
.folder-pill .del{font-size:11px; opacity:0; padding:1px 3px; border-radius:5px}
.folder-pill:hover .del{opacity:.7}
.folder-pill .del:hover{opacity:1; background:rgba(255,255,255,.5)}
.folder-pill.new{
  background:transparent; border:1.5px dashed var(--line); color:var(--ink-soft); font-weight:500;
  padding:8px 14px;
}
.folder-pill.new::before{display:none}
.folder-select{
  font-family:var(--ui); font-size:11px; padding:3px 9px; border-radius:999px; border:1px dashed var(--line);
  background:transparent; color:var(--ink-soft); cursor:pointer; max-width:120px;
}
.folder-select.set{border-style:solid; border-color:rgba(192,132,151,.4); background:rgba(192,132,151,.14); color:var(--accent-deep); font-weight:700}
.status-toggle{
  align-self:flex-start; font-family:var(--mono); font-size:11px; padding:4px 10px;
  border-radius:999px; border:1px dashed var(--line); color:var(--ink-soft);
}
.status-toggle[data-s="reading"]{border-style:solid; border-color:var(--accent); color:var(--accent-deep); background:rgba(192,132,151,.08)}
.status-toggle[data-s="done"]{border-style:solid; border-color:#7fb694; color:#3f7c58; background:var(--mint)}
.card .rowend{display:flex; justify-content:space-between; align-items:center}
.trash{color:var(--ink-soft); font-size:15px; padding:4px 6px; border-radius:8px; opacity:0}
.card:hover .trash{opacity:.8}
.trash:hover{background:var(--blush); color:#a4485e; opacity:1}
.empty{
  border:1.5px dashed var(--line); border-radius:var(--r); padding:64px 28px; text-align:center;
  color:var(--ink-soft); background:rgba(255,255,255,.5);
}
.empty .big{font-family:var(--display); font-size:24px; color:var(--ink); margin-bottom:8px}
.progressbar{height:4px; border-radius:99px; background:var(--paper); overflow:hidden}
.progressbar i{display:block; height:100%; background:var(--accent); border-radius:99px}

/* ---------- add modal ---------- */
.scrim{position:fixed; inset:0; background:rgba(46,42,59,.35); backdrop-filter:blur(3px); z-index:60; display:flex; align-items:center; justify-content:center; padding:20px}
.modal{
  width:min(620px,100%); max-height:88vh; overflow:auto; background:var(--card);
  border-radius:20px; box-shadow:var(--shadow-lift); padding:28px;
}
.modal h2{font-family:var(--display); font-size:24px; font-weight:600; margin-bottom:4px}
.modal .hint{font-size:13px; color:var(--ink-soft); margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block; font-size:12px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px}
.field input[type=text], .field textarea{
  width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:#FCFBFE;
}
.field textarea{min-height:150px; resize:vertical; font-family:var(--read); font-size:14px; line-height:1.55}
.dropzone{
  border:1.5px dashed var(--accent); border-radius:12px; padding:22px; text-align:center;
  background:rgba(192,132,151,.05); color:var(--ink-soft); font-size:13.5px; cursor:pointer;
  transition:background .12s ease;
}
.dropzone:hover,.dropzone.drag{background:rgba(192,132,151,.12)}
.dropzone b{color:var(--accent-deep)}
.dropzone .filename{font-family:var(--mono); font-size:12px; color:var(--ink); margin-top:6px}
.or{display:flex; align-items:center; gap:12px; color:var(--ink-soft); font-family:var(--mono); font-size:11px; margin:18px 0}
.or::before,.or::after{content:""; flex:1; height:1px; background:var(--line)}
.modal .actions{display:flex; justify-content:flex-end; gap:10px; margin-top:8px}

/* ---------- reader ---------- */
.reader-wrap{display:flex; gap:0; align-items:flex-start; max-width:1240px; margin:0 auto}
.reader{
  flex:1; min-width:0; padding:44px clamp(20px,5vw,72px) 120px;
}
.reader-head{margin-bottom:30px; padding-bottom:22px; border-bottom:1px solid var(--line)}
.reader-head h1{font-family:var(--display); font-size:clamp(26px,3.6vw,38px); font-weight:600; line-height:1.16; margin-bottom:10px}
.reader-head .byline{font-family:var(--mono); font-size:12px; color:var(--ink-soft); display:flex; gap:14px; flex-wrap:wrap}
.article{font-family:var(--read); font-size:17.5px; line-height:1.78; max-width:70ch}
.article p{margin-bottom:1.25em}
.article.pdf-mode{max-width:min(880px,100%); display:flex; flex-direction:column; align-items:center}
.pdf-loading{font-family:var(--mono); font-size:13px; color:var(--ink-soft); padding:60px 0}
.pdf-page{
  position:relative; margin-bottom:22px; background:#fff; border-radius:4px;
  box-shadow:var(--shadow); overflow:hidden;
}
.pdf-page canvas{display:block}
.textLayer{
  position:absolute; inset:0; overflow:clip; opacity:1; line-height:1;
  text-align:initial; transform-origin:0 0;
}
.textLayer span, .textLayer br{
  color:transparent; position:absolute; white-space:pre; cursor:text; transform-origin:0 0;
}
.textLayer ::selection{background:rgba(192,132,151,.35)}
.textLayer mark.hl{background:color-mix(in srgb, var(--hlc) 55%, transparent) !important}
mark.hl{
  padding:1.5px 1px; border-radius:3px; cursor:pointer; position:relative;
  background:linear-gradient(104deg, transparent 0.5%, var(--hlc) 3%, var(--hlc) 97%, transparent 99.5%);
  box-decoration-break:clone; -webkit-box-decoration-break:clone;
  transition:filter .1s ease;
}
mark.hl:hover{filter:saturate(1.35)}
mark.hl.has-note::after{
  content:"✎"; font-size:10px; color:var(--accent-deep);
  position:relative; top:-7px; left:1px; margin-right:-2px;
}
mark.hl.flash{animation:flash .9s ease}
@keyframes flash{0%{filter:saturate(2.4) brightness(.92)} 100%{filter:none}}

/* selection toolbar */
.seltool{
  position:absolute; z-index:70; display:flex; align-items:center; gap:7px;
  background:var(--ink); border-radius:999px; padding:8px 12px; box-shadow:var(--shadow-lift);
  animation:pop .14s ease;
}
@keyframes pop{from{transform:translateY(4px) scale(.96); opacity:0}}
.swatch{width:22px; height:22px; border-radius:50%; border:2px solid rgba(255,255,255,.65); transition:transform .1s ease}
.swatch:hover{transform:scale(1.18)}
.seltool .divider{width:1px; height:18px; background:rgba(255,255,255,.25)}
.seltool .tool{color:#fff; font-size:13px; font-weight:500; padding:2px 6px; border-radius:6px; display:flex; gap:5px; align-items:center}
.seltool .tool:hover{background:rgba(255,255,255,.14)}

/* ---------- notes rail ---------- */
.rail{
  width:340px; flex-shrink:0; position:sticky; top:63px; height:calc(100vh - 63px);
  border-left:1px solid var(--line); background:rgba(255,255,255,.55); backdrop-filter:blur(6px);
  display:flex; flex-direction:column;
}
.rail-head{display:flex; align-items:center; gap:6px; padding:16px 18px 10px}
.rail-head .rtab{
  font-size:13px; font-weight:700; padding:7px 13px; border-radius:999px; color:var(--ink-soft);
}
.rail-head .rtab.on{background:var(--ink); color:#fff}
.rail-head .spacer{flex:1}
.rail-body{flex:1; overflow-y:auto; padding:8px 18px 30px; display:flex; flex-direction:column; gap:14px}
.rail-empty{color:var(--ink-soft); font-size:13px; text-align:center; padding:40px 16px; line-height:1.6}
.rail-empty .glyph{font-size:26px; display:block; margin-bottom:8px}

.sticky{
  --tilt:-1.1deg;
  background:var(--butter); border-radius:4px 4px 12px 4px; padding:14px 14px 12px;
  box-shadow:0 1px 2px rgba(46,42,59,.10), 0 6px 14px rgba(46,42,59,.10);
  transform:rotate(var(--tilt)); position:relative; cursor:pointer;
  transition:transform .14s ease, box-shadow .14s ease;
}
.sticky:nth-child(even){--tilt:1.2deg}
.sticky:hover{transform:rotate(0deg) translateY(-2px); box-shadow:var(--shadow-lift)}
.sticky .pin{
  position:absolute; top:-7px; left:50%; transform:translateX(-50%);
  width:34px; height:14px; background:rgba(192,132,151,.32); border-radius:2px;
}
.sticky .quote{
  font-family:var(--read); font-style:italic; font-size:12.5px; color:rgba(46,42,59,.72);
  border-left:2px solid rgba(46,42,59,.25); padding-left:8px; margin-bottom:8px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.sticky .body{font-size:13.5px; line-height:1.55; white-space:pre-wrap; word-break:break-word}
.sticky .body:empty::before{content:"(no note yet — click to write)"; color:rgba(46,42,59,.45); font-style:italic}
.sticky .foot{display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-family:var(--mono); font-size:10.5px; color:rgba(46,42,59,.5)}
.sticky .del{font-size:13px; padding:2px 5px; border-radius:6px; opacity:0}
.sticky:hover .del{opacity:.75}
.sticky .del:hover{background:rgba(255,255,255,.6); opacity:1}
.sticky textarea{
  width:100%; background:rgba(255,255,255,.45); border:1px dashed rgba(46,42,59,.3);
  border-radius:8px; padding:8px; font-size:13.5px; line-height:1.5; min-height:74px; resize:vertical;
}
.hl-row{
  background:var(--card); border:1px solid var(--line); border-left:5px solid var(--hlc);
  border-radius:10px; padding:10px 12px; cursor:pointer; transition:transform .12s ease;
}
.hl-row:hover{transform:translateX(3px)}
.hl-row .q{font-family:var(--read); font-size:13px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
.hl-row .foot{display:flex; justify-content:space-between; margin-top:6px; font-family:var(--mono); font-size:10.5px; color:var(--ink-soft)}

/* highlight popover */
.hlpop{
  position:absolute; z-index:70; background:var(--card); border:1px solid var(--line);
  border-radius:14px; box-shadow:var(--shadow-lift); padding:12px; width:280px; animation:pop .14s ease;
}
.hlpop .swatches{display:flex; gap:8px; margin-bottom:10px}
.hlpop .swatch{border-color:var(--line)}
.hlpop .swatch.on{border-color:var(--ink)}
.hlpop textarea{width:100%; border:1px solid var(--line); border-radius:8px; padding:8px; min-height:66px; font-size:13px; resize:vertical; background:#FCFBFE}
.hlpop .row{display:flex; justify-content:space-between; align-items:center; margin-top:8px}
.hlpop .danger{color:#a4485e; font-size:12.5px}
.hlpop .danger:hover{text-decoration:underline}

/* toast + misc */
.toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:90;
  background:var(--ink); color:#fff; font-size:13.5px; padding:10px 18px; border-radius:999px;
  box-shadow:var(--shadow-lift); animation:pop .18s ease;
}
.banner{
  background:var(--blush); color:#7c3a4c; font-size:12.5px; text-align:center; padding:7px 14px;
}
.rail-toggle{display:none}
.fab-notes{display:none}

@media (max-width:920px){
  .rail{
    position:fixed; right:0; top:0; height:100vh; z-index:80; width:min(360px,92vw);
    transform:translateX(105%); transition:transform .22s ease; border-left:1px solid var(--line);
    background:#fff; box-shadow:var(--shadow-lift);
  }
  .rail.open{transform:none}
  .rail-toggle{display:inline-flex}
  .fab-notes{
    display:flex; position:fixed; bottom:22px; right:20px; z-index:50;
    width:54px; height:54px; border-radius:50%; background:var(--ink); color:#fff;
    align-items:center; justify-content:center; font-size:21px; box-shadow:var(--shadow-lift);
  }
  .crumb{display:none}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important; transition:none !important}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
/* =========================================================
   Lily's Notetaker — a reading & annotation desk
   ========================================================= */

const COLORS = {
  butter:'#FDF3B4', mint:'#CDEBD8', sky:'#CFE4F7', blush:'#F9D8DF', lilac:'#E3D7F3'
};
const COLOR_ORDER = ['butter','mint','sky','blush','lilac'];
const FOLDER_ICON = `<svg class="ficon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6.5a1.5 1.5 0 0 1 1.5-1.5h4.4l1.8 2H19a1.5 1.5 0 0 1 1.5 1.5v8.5a1.5 1.5 0 0 1-1.5 1.5H4.5A1.5 1.5 0 0 1 3 17V6.5z"/></svg>`;

/* ---------- storage: Claude artifact storage → localStorage → memory ---------- */
const mem = {};
const hasClaudeStore = typeof window.storage !== 'undefined';
const hasLocalStore = (()=>{ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }catch(e){ return false; } })();
const hasStore = hasClaudeStore || hasLocalStore;
async function sGet(key){
  if(hasClaudeStore){ try{ const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }catch(e){ return null; } }
  if(hasLocalStore){ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  return mem[key] ?? null;
}
async function sSet(key,val){
  if(hasClaudeStore){ try{ await window.storage.set(key, JSON.stringify(val)); }catch(e){ toast('Could not save — storage error'); } return; }
  if(hasLocalStore){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ toast('Could not save — browser storage is full'); } return; }
  mem[key]=val;
}
async function sDel(key){
  if(hasClaudeStore){ try{ await window.storage.delete(key); }catch(e){} return; }
  if(hasLocalStore){ localStorage.removeItem(key); return; }
  delete mem[key];
}

/* ---------- state ---------- */
let index = [];            // [{id,title,source,tags,folderId,added,status,hlCount,noteCount,progress}]
let folders = [];          // [{id,name}]
let current = null;        // {id, paras:[], highlights:[], notes:[]}
let view = 'library';
let filterTag = null, filterFolder = null, searchQ = '';
let railTab = 'notes';
const app = document.getElementById('app');
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = ts => new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});

function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

function promptModal(title, hint, placeholder){
  return new Promise(resolve=>{
    const scrim = document.createElement('div');
    scrim.className='scrim';
    scrim.onclick = e=>{ if(e.target===scrim){ scrim.remove(); resolve(null); } };
    scrim.innerHTML = `
      <div class="modal" style="width:min(380px,100%)">
        <h2>${esc(title)}</h2>
        <div class="hint">${esc(hint)}</div>
        <div class="field"><input type="text" id="pmInput" placeholder="${esc(placeholder)}"></div>
        <div class="actions">
          <button class="btn" id="pmCancel">Cancel</button>
          <button class="btn primary" id="pmOk">Create</button>
        </div>
      </div>`;
    document.body.appendChild(scrim);
    const input = scrim.querySelector('#pmInput');
    input.focus();
    const finish = ()=>{ const v = input.value.trim(); scrim.remove(); resolve(v || null); };
    scrim.querySelector('#pmOk').onclick = finish;
    scrim.querySelector('#pmCancel').onclick = ()=>{ scrim.remove(); resolve(null); };
    input.onkeydown = e=>{
      if(e.key==='Enter'){ e.preventDefault(); finish(); }
      if(e.key==='Escape'){ scrim.remove(); resolve(null); }
    };
  });
}

function confirmModal(title, hint, confirmLabel){
  return new Promise(resolve=>{
    const scrim = document.createElement('div');
    scrim.className='scrim';
    scrim.onclick = e=>{ if(e.target===scrim){ scrim.remove(); resolve(false); } };
    scrim.innerHTML = `
      <div class="modal" style="width:min(380px,100%)">
        <h2>${esc(title)}</h2>
        <div class="hint">${esc(hint)}</div>
        <div class="actions">

          <button class="btn primary" id="cmOk" style="background:#a4485e; border-color:#a4485e">${esc(confirmLabel)}</button>
        </div>
      </div>`;
    document.body.appendChild(scrim);
    scrim.querySelector('#cmCancel').onclick = ()=>{ scrim.remove(); resolve(false); };
    scrim.querySelector('#cmOk').onclick = ()=>{ scrim.remove(); resolve(true); };
  });
}

async function createFolder(){
  const name = await promptModal('New folder', 'Give it a name — like a class you’re sorting readings for.', 'e.g. PSCI 0200');
  if(!name) return null;
  let f = folders.find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(f){ toast('That folder already exists'); return f; }
  f = {id:uid(), name};
  folders.push(f);
  await saveFolders();
  return f;
}

async function addFolderFromLibrary(){
  const f = await createFolder();
  if(!f) return;
  filterFolder = f.id;
  renderLibrary();
  toast('Folder created ✓');
}

async function deleteFolder(id){
  const f = folders.find(x=>x.id===id); if(!f) return;
  const ok = await confirmModal('Delete folder?', `Delete the "${f.name}" folder? Articles inside won’t be deleted, just unsorted.`, 'Delete folder');
  if(!ok) return;
  folders = folders.filter(x=>x.id!==id);
  index.forEach(a=>{ if(a.folderId===id) a.folderId=null; });
  if(filterFolder===id) filterFolder=null;
  await saveFolders(); await saveIndex();
  renderLibrary(); toast('Folder deleted');
}

async function assignFolder(articleId, folderId){
  const a = index.find(x=>x.id===articleId); if(!a) return;
  a.folderId = folderId || null;
  await saveIndex(); refreshGrid();
}

// some PDF fonts lack a ToUnicode entry for ligature glyphs (fi/fl), so pdf.js
// extracts them as a stray control character — invisible in HTML, so "fifteen"
// silently becomes "fteen". Disambiguate using a common "fl"-word list (fi is
// far more frequent) and drop lone control-char runs (decorative dinkus glyphs).
const FL_WORDS = new Set(['flag','flags','flagged','flagging','flagrant','flagship','flail','flair','flake','flaky','flame','flamed','flames','flaming','flammable','flamboyant','flank','flannel','flap','flapped','flapping','flare','flared','flares','flash','flashed','flashes','flashy','flask','flat','flats','flatten','flattened','flattening','flatter','flattered','flattering','flattery','flaunt','flaunted','flaunting','flavor','flavored','flavoring','flavors','flavour','flavoured','flavours','flaw','flawed','flawless','flaws','flea','fleas','fled','flee','fleece','fleeing','fleet','fleeting','flesh','fleshed','fleshy','flew','flex','flexed','flexes','flexibility','flexible','flick','flicked','flicker','flickered','flickering','flickers','flies','flight','flights','flighty','flimsy','fling','flinch','flinched','flinches','flinching','flint','flip','flipped','flipping','flips','flippant','flirt','flirted','flirting','flirtatious','float','floated','floating','floats','flock','flocked','flocking','flocks','flood','flooded','flooding','floods','floor','floors','flop','flopped','flopping','flops','floppy','floral','florid','florist','flotilla','flounder','floundered','floundering','flour','flourish','flourished','flourishing','flout','flow','flowed','flower','flowered','flowering','flowers','flowing','flown','flows','flu','fluctuate','fluctuated','fluctuating','fluctuation','fluctuations','flue','fluency','fluent','fluently','fluff','fluffy','fluid','fluids','fluke','flung','flunk','fluorescent','fluoride','flurry','flush','flushed','flushes','flushing','fluster','flustered','flute','flutter','fluttered','fluttering','flux','fly','flyer','flyers','flying','afflict','afflicted','afflicting','afflicts','affliction','afflictions','conflict','conflicted','conflicting','conflicts','deflate','deflated','deflect','deflected','deflecting','deflects','inflame','inflamed','inflammation','inflammatory','inflate','inflated','inflates','inflating','inflation','inflect','inflected','inflection','inflict','inflicted','inflicting','inflicts','reflect','reflected','reflecting','reflection','reflections','reflective','reflects','reflex','reflexes','reflexive']);
function fixLigatures(str){
  if(!/[\x00-\x08\x0B\x0C\x0E-\x1F]/.test(str)) return str;
  const stripped = str.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\s]/g,'');
  if(stripped === '') return '';
  return str.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, (match, offset, full) => {
    const before = full.slice(0, offset).match(/[A-Za-z]*$/)[0];
    const after = full.slice(offset + match.length).match(/^[A-Za-z]*/)[0];
    const tryFl = (before + 'fl' + after).toLowerCase();
    return FL_WORDS.has(tryFl) ? 'fl' : 'fi';
  });
}

// Mutates tc.items in place (ligature fix + a space at line-wraps, unless
// hyphenated) and returns the page's flat text. Used identically at upload
// time (to build the stored offset-basis for highlights) and at read time
// (to build the visual text layer via pdfjsLib.renderTextLayer), so the two
// always agree character-for-character and highlight offsets stay aligned.
function preparePageText(tc){
  // pdf.js sometimes marks a line's end via a *separate* empty-string item
  // (hasEOL:true, str:"") rather than flagging the preceding content item, so
  // track the running total rather than checking each item in isolation.
  let acc = '';
  tc.items.forEach(it=>{
    if(it.str===undefined) return;
    let s = fixLigatures(it.str);
    acc += s;
    if(it.hasEOL && acc && !/[-‐-―]$/.test(acc) && !acc.endsWith(' ')){
      s += ' '; acc += ' ';
    }
    it.str = s;
  });
  return acc;
}

// PDFs are shown as-rendered (canvas + an invisible selectable text layer) so
// layout, fonts and images stay intact — no reflowed/re-wrapped text. `paras[i]`
// for a PDF article holds page i's full text (one entry per page, not per
// paragraph) since that's what highlight offsets are anchored against; it also
// serves as a plain-text fallback if the stored PDF bytes ever fail to reload.
async function extractPdfForStorage(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: new Uint8Array(buf.slice(0))}).promise;
  const paras = [];
  for(let p=1; p<=pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    paras.push(preparePageText(tc));
  }
  return {paras, pdfBytes: buf};
}

function arrayBufferToBase64(buf){
  let binary = '';
  const bytes = new Uint8Array(buf);
  const chunk = 0x8000;
  for(let i=0; i<bytes.length; i+=chunk){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}
function base64ToUint8Array(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

function textToParas(text){
  // strip html if it looks like html
  if(/<\/?(p|div|html|body|h\d)[\s>]/i.test(text)){
    const doc = new DOMParser().parseFromString(text,'text/html');
    const blocks = [...doc.querySelectorAll('p,h1,h2,h3,h4,li,blockquote')].map(el=>el.textContent.trim()).filter(Boolean);
    if(blocks.length) return blocks;
    text = doc.body ? doc.body.textContent : text;
  }
  return text.split(/\n\s*\n|\r\n\s*\r\n/).map(p=>p.replace(/\s+/g,' ').trim()).filter(Boolean);
}

async function saveNewArticle(){
  const btn = document.getElementById('saveBtn');
  const title = document.getElementById('titleBox').value.trim();
  const source = document.getElementById('srcBox').value.trim();
  const tags = document.getElementById('tagBox').value.split(',').map(t=>t.trim()).filter(Boolean);
  const folderVal = document.getElementById('folderBox').value;
  const folderId = folderVal && folderVal!=='__new__' ? folderVal : null;
  const pasted = document.getElementById('pasteBox').value.trim();

  if(!pendingFile && !pasted){ toast('Add a file or paste some text first'); return; }
  if(!title){ toast('Give it a title'); return; }
  btn.textContent = 'Reading…'; btn.disabled = true;

  let paras = [], pdfBytes = null, kind = 'text';
  try{
    if(pendingFile){
      if(/\.pdf$/i.test(pendingFile.name)){
        const extracted = await extractPdfForStorage(pendingFile);
        paras = extracted.paras; pdfBytes = extracted.pdfBytes; kind = 'pdf';
      }
      else paras = textToParas(await pendingFile.text());
    } else {
      paras = textToParas(pasted);
    }
  }catch(err){
    console.error(err);
    toast('Could not read that file — try pasting the text instead');
    btn.textContent='Save to desk'; btn.disabled=false; return;
  }
  if(!paras.length){ toast('No readable text found in that file'); btn.textContent='Save to desk'; btn.disabled=false; return; }

  const id = uid();
  const meta = {id, title, source, tags, folderId, kind, added:Date.now(), status:'to read', hlCount:0, noteCount:0, progress:0};
  index.push(meta);
  await sSet('lilysnotes:article:'+id, {paras, highlights:[], notes:[]});
  if(pdfBytes) await sSet('lilysnotes:pdfbytes:'+id, arrayBufferToBase64(pdfBytes));
  await saveIndex();
  document.getElementById('addScrim').remove();
  openArticle(id);
  toast('Added to your desk ✓');
}

async function openArticle(id){
  const meta = index.find(a=>a.id===id); if(!meta) return;
  const data = await sGet('lilysnotes:article:'+id);
  if(!data){ toast('Could not load that article'); return; }
  current = {meta, ...data, pdfDoc:null};
  if(meta.kind==='pdf'){
    try{
      const b64 = await sGet('lilysnotes:pdfbytes:'+id);
      if(b64) current.pdfDoc = await pdfjsLib.getDocument({data: base64ToUint8Array(b64)}).promise;
      else toast('Original PDF not found — showing extracted text instead');
    }catch(err){
      console.error(err);
      toast('Could not re-open the original PDF — showing extracted text instead');
    }
  }
  view='reader'; railTab = 'notes';
  await renderReader();
  // restore scroll
  requestAnimationFrame(()=>{
    if(meta.progress) window.scrollTo(0, meta.progress * (document.body.scrollHeight - innerHeight));
  });
}

      <div class="rail" id="rail">
        <div class="rail-head">
          <button class="rtab ${railTab==='notes'?'on':''}" onclick="railTab='notes'; drawRail()">Sticky notes</button>
          <button class="rtab ${railTab==='hl'?'on':''}" onclick="railTab='hl'; drawRail()">Highlights</button>
          <div class="spacer"></div>
          <button class="btn small ghost" title="Add a free sticky note" onclick="addFreeNote()">＋ note</button>
        </div>
        <div class="rail-body" id="railBody"></div>
      </div>
    </div>
    <button class="fab-notes" aria-label="Open notes" onclick="document.getElementById('rail').classList.toggle('open')">🗒</button>`;
  drawRail();
  updateCounts();
  attachReaderEvents();
  await drawArticle();
}

function updateCounts(){
  const el = document.getElementById('countLine');
  if(el) el.textContent = `${current.highlights.length} highlights · ${current.notes.length} notes`;
  const m = current.meta;
  m.hlCount = current.highlights.length;
  m.noteCount = current.notes.length;
}

async function drawArticle(){
  const box = document.getElementById('article');
  if(isPdfView()){
    try{ await drawPdfPages(box); return; }
    catch(err){ console.error(err); toast('Could not render the PDF — showing extracted text instead'); current.pdfDoc = null; }
  }
  box.innerHTML = current.paras.map((p,i)=>`<p class="para" data-idx="${i}">${renderPara(i)}</p>`).join('');
}

async function drawPdfPages(box){
  box.innerHTML = '';
  const pdf = current.pdfDoc;
  const targetWidth = Math.min(box.clientWidth || 880, 880);
  for(let p=1; p<=pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const baseViewport = page.getViewport({scale:1});
    const cssScale = targetWidth / baseViewport.width;
    const dpr = window.devicePixelRatio || 1;
    const cssViewport = page.getViewport({scale:cssScale});
    const renderViewport = page.getViewport({scale:cssScale*dpr});

    const wrap = document.createElement('div');
    wrap.className = 'para pdf-page';
    wrap.dataset.idx = p-1;
    wrap.style.width = cssViewport.width+'px';
    wrap.style.height = cssViewport.height+'px';
    box.appendChild(wrap);

    const canvas = document.createElement('canvas');
    canvas.width = renderViewport.width; canvas.height = renderViewport.height;
    canvas.style.width = cssViewport.width+'px'; canvas.style.height = cssViewport.height+'px';
    wrap.appendChild(canvas);
    await page.render({canvasContext: canvas.getContext('2d'), viewport: renderViewport}).promise;

    const tc = await page.getTextContent();
    preparePageText(tc); // must match extractPdfForStorage exactly so highlight offsets stay aligned
    const textLayerDiv = document.createElement('div');
    textLayerDiv.className = 'textLayer';
    textLayerDiv.style.setProperty('--scale-factor', cssScale);
    wrap.appendChild(textLayerDiv);
    await pdfjsLib.renderTextLayer({textContentSource: tc, container: textLayerDiv, viewport: cssViewport}).promise;

    applyMarksToPage(p-1, textLayerDiv);
  }
}

function buildMarkedHTML(text, baseOffset, hls){
  if(!hls.length) return esc(text);
  let html = '', pos = 0;
  hls.forEach(h=>{
    const s = Math.max(pos, h.start-baseOffset), e = Math.min(text.length, h.end-baseOffset);
    if(s >= e) return;
    if(s > pos) html += esc(text.slice(pos, s));
    const hasNote = current.notes.some(n=>n.hlId===h.id && n.text);
    html += `<mark class="hl ${hasNote?'has-note':''}" data-hl="${h.id}" style="--hlc:${COLORS[h.color]}">${esc(text.slice(s,e))}</mark>`;
    pos = e;
  });
  html += esc(text.slice(pos));
  return html;
}

function renderPara(i){
  const hls = current.highlights.filter(h=>h.para===i).sort((a,b)=>a.start-b.start);
  return buildMarkedHTML(current.paras[i], 0, hls);
}

// re-applies stored highlights onto an already-rendered PDF page's text layer,
// without touching the canvas or re-running renderTextLayer
function applyMarksToPage(pageIdx, textLayerDiv){
  const hls = current.highlights.filter(h=>h.para===pageIdx).sort((a,b)=>a.start-b.start);
  const spans = [...textLayerDiv.querySelectorAll('span')].filter(s=>!s.querySelector('span'));
  let offset = 0;
  spans.forEach(span=>{
    const text = span.textContent;
    const relevant = hls.filter(h=>h.end>offset && h.start<offset+text.length);
    span.innerHTML = buildMarkedHTML(text, offset, relevant);
    offset += text.length;
  });
}

function redrawPara(i){
  if(isPdfView()){
    const wrap = document.querySelector(`.pdf-page[data-idx="${i}"]`);
    const tl = wrap && wrap.querySelector('.textLayer');
    if(tl) applyMarksToPage(i, tl);
    return;
  }
  const p = document.querySelector(`.para[data-idx="${i}"]`);
  if(p) p.innerHTML = renderPara(i);
}

async function persist(){
  updateCounts();
  await sSet('lilysnotes:article:'+current.meta.id, {
    paras: current.paras, highlights: current.highlights, notes: current.notes
  });
  await saveIndex();
}

/* ---------- selection → highlight ---------- */
let globalListenersOn = false;
function attachReaderEvents(){
  const article = document.getElementById('article');

  article.addEventListener('click', e=>{
    const mk = e.target.closest('mark.hl');
    if(mk){ e.stopPropagation(); openHlPopover(mk.dataset.hl, mk); }
  });

  if(globalListenersOn) return;
  globalListenersOn = true;

  document.addEventListener('mouseup', e=>{
    if(e.target.closest && (e.target.closest('.seltool') || e.target.closest('.hlpop') || e.target.closest('.rail'))) return;
    onSelectMaybe();
  });
  document.addEventListener('touchend', e=>{
    if(e.target.closest && (e.target.closest('.seltool') || e.target.closest('.hlpop') || e.target.closest('.rail'))) return;
    setTimeout(onSelectMaybe, 10);
  });

  document.addEventListener('click', e=>{
    if(!e.target.closest('.seltool')) removeSelTool();
    if(!e.target.closest('.hlpop') && !e.target.closest('mark.hl')) removeHlPop();
  });

  // save reading progress (throttled)
  let t=null;
  window.addEventListener('scroll', ()=>{
    if(view!=='reader' || !current) return;
    clearTimeout(t);
    t = setTimeout(()=>{
      const max = document.body.scrollHeight - innerHeight;
      current.meta.progress = max>0 ? Math.min(1, scrollY/max) : 0;
      if(current.meta.progress > .02 && current.meta.status==='to read') current.meta.status='reading';
      saveIndex();
    }, 400);
  }, {passive:true});
}

function getSelectionInfo(){
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed || !sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  const article = document.getElementById('article');
  if(!article || !article.contains(range.commonAncestorContainer)) return null;

  function locate(node, offset){
    let el = node.nodeType===3 ? node.parentElement : node;
    const para = el.closest('.para');
    if(!para) return null;
    // walk text nodes of the paragraph, summing lengths until we hit `node`
    const walker = document.createTreeWalker(para, NodeFilter.SHOW_TEXT);
    let sum = 0, n;
    while((n = walker.nextNode())){
      if(n === node) return {idx:+para.dataset.idx, off: sum + offset};
      sum += n.textContent.length;
    }
    // node wasn't a text node (e.g. element boundary) — approximate
    return {idx:+para.dataset.idx, off: offset===0 ? 0 : sum};
  }
  const a = locate(range.startContainer, range.startOffset);
  const b = locate(range.endContainer, range.endOffset);
  if(!a || !b) return null;
  const rect = range.getBoundingClientRect();
  return {a, b, rect};
}

let pendingSel = null;
function onSelectMaybe(){
  if(view!=='reader') return;
  removeSelTool();
  const info = getSelectionInfo();
  if(!info) return;
  pendingSel = info;
  const tool = document.createElement('div');
  tool.className='seltool';
  tool.innerHTML = COLOR_ORDER.map(c=>
    `<button class="swatch" title="Highlight ${c}" style="background:${COLORS[c]}" onclick="applyHighlight('${c}', false)"></button>`
  ).join('') + `<div class="divider"></div>
    <button class="tool" onclick="applyHighlight('butter', true)">✎ Note</button>`;
  document.body.appendChild(tool);
  const top = info.rect.top + scrollY - tool.offsetHeight - 46;
  tool.style.top = Math.max(scrollY+8, top + 36) + 'px';
  tool.style.left = Math.max(8, Math.min(innerWidth - 300, info.rect.left + info.rect.width/2 - 130)) + 'px';
}
function removeSelTool(){ document.querySelectorAll('.seltool').forEach(t=>t.remove()); }

async function applyHighlight(color, withNote){
  if(!pendingSel) return;
  const {a,b} = pendingSel;
  const spans = [];
  if(a.idx === b.idx){
    if(b.off > a.off) spans.push({para:a.idx, start:a.off, end:b.off});
  } else {
    const [lo, hi] = a.idx < b.idx ? [a,b] : [b,a];
    spans.push({para:lo.idx, start:lo.off, end:current.paras[lo.idx].length});
    for(let i=lo.idx+1; i<hi.idx; i++) spans.push({para:i, start:0, end:current.paras[i].length});
    spans.push({para:hi.idx, start:0, end:hi.off});
  }
  let firstId = null;
  spans.forEach(sp=>{
    // clip against existing highlights in the same paragraph
    const existing = current.highlights.filter(h=>h.para===sp.para);
    let segs = [[sp.start, sp.end]];
    existing.forEach(h=>{
      segs = segs.flatMap(([s,e])=>{
        if(e<=h.start || s>=h.end) return [[s,e]];
        const out=[];
        if(s < h.start) out.push([s, h.start]);
        if(e > h.end) out.push([h.end, e]);
        return out;
      });
    });
    segs.forEach(([s,e])=>{
      if(e-s < 1) return;
      const h = {id:uid(), para:sp.para, start:s, end:e, color,
                 text: current.paras[sp.para].slice(s,e), created:Date.now()};
      current.highlights.push(h);
      if(!firstId) firstId = h.id;
    });
  });
  window.getSelection().removeAllRanges();
  removeSelTool();
  pendingSel = null;
  if(!firstId){ toast('That text is already highlighted'); return; }
  spans.forEach(sp=>redrawPara(sp.para));
  if(withNote){
    const note = {id:uid(), hlId:firstId, text:'', created:Date.now()};
    current.notes.push(note);
    await persist(); drawRail();
    document.getElementById('rail').classList.add('open');
    editNote(note.id, true);
  } else {
    await persist(); drawRail();
  }
}

/* ---------- highlight popover ---------- */
function openHlPopover(hlId, markEl){
  removeHlPop(); removeSelTool();
  const h = current.highlights.find(x=>x.id===hlId); if(!h) return;
  const note = current.notes.find(n=>n.hlId===hlId);
  const pop = document.createElement('div');
  pop.className='hlpop'; pop.id='hlpop';
  pop.innerHTML = `
    <div class="swatches">${COLOR_ORDER.map(c=>
      `<button class="swatch ${h.color===c?'on':''}" style="background:${COLORS[c]}" onclick="recolorHl('${hlId}','${c}')"></button>`).join('')}
    </div>
    <textarea id="popNote" placeholder="Add a sticky note about this passage…">${esc(note?.text||'')}</textarea>
    <div class="row">
      <button class="danger" onclick="deleteHl('${hlId}')">Remove highlight</button>
      <button class="btn small primary" onclick="savePopNote('${hlId}')">Save</button>
    </div>`;
  document.body.appendChild(pop);
  const r = markEl.getBoundingClientRect();
  pop.style.top = (r.bottom + scrollY + 8) + 'px';
  pop.style.left = Math.max(8, Math.min(innerWidth - 296, r.left)) + 'px';
  pop.querySelector('#popNote').focus();
}
function removeHlPop(){ const p=document.getElementById('hlpop'); if(p) p.remove(); }

async function recolorHl(hlId, color){
  const h = current.highlights.find(x=>x.id===hlId); if(!h) return;
  h.color = color;
  redrawPara(h.para); await persist(); drawRail();
  document.querySelectorAll('#hlpop .swatch').forEach((s,i)=>s.classList.toggle('on', COLOR_ORDER[i]===color));
}
async function savePopNote(hlId){
  const txt = document.getElementById('popNote').value.trim();
  let note = current.notes.find(n=>n.hlId===hlId);
  if(txt){
    if(note) note.text = txt;
    else current.notes.push({id:uid(), hlId, text:txt, created:Date.now()});
  } else if(note){
    current.notes = current.notes.filter(n=>n!==note);
  }
  const h = current.highlights.find(x=>x.id===hlId);
  if(h) redrawPara(h.para);
  removeHlPop(); await persist(); drawRail();
  toast('Saved ✓');
}
async function deleteHl(hlId){
  const h = current.highlights.find(x=>x.id===hlId); if(!h) return;
  current.highlights = current.highlights.filter(x=>x.id!==hlId);
  current.notes = current.notes.filter(n=>n.hlId!==hlId);
  redrawPara(h.para); removeHlPop(); await persist(); drawRail();
}

/* ---------- rail (sticky notes & highlights) ---------- */
function drawRail(){
  const body = document.getElementById('railBody');
  if(!body) return;
  if(railTab==='notes'){
    const notes = [...current.notes].sort((a,b)=>b.created-a.created);
    if(!notes.length){
      body.innerHTML = `<div class="rail-empty"><span class="glyph">🗒</span>
        No sticky notes yet.<br>Select a passage and choose <b>✎ Note</b>,<br>or add a free note with <b>＋ note</b> above.</div>`;
      return;
    }
    body.innerHTML = notes.map(n=>{
      const h = n.hlId ? current.highlights.find(x=>x.id===n.hlId) : null;
      const bg = h ? COLORS[h.color] : COLORS.butter;
      return `<div class="sticky" style="background:${bg}" data-note="${n.id}"
                onclick="onStickyClick(event,'${n.id}')">
        <div class="pin"></div>
        ${h?`<div class="quote">“${esc(h.text)}”</div>`:''}
        <div class="body" id="nb-${n.id}">${esc(n.text)}</div>
        <div class="foot">
          <span>${fmtDate(n.created)}${h?' · anchored':' · free note'}</span>
          <button class="del" title="Delete note" onclick="event.stopPropagation(); deleteNote('${n.id}')">🗑</button>
        </div>
      </div>`;
    }).join('');
  } else {
    const hls = [...current.highlights].sort((a,b)=> a.para-b.para || a.start-b.start);
    if(!hls.length){
      body.innerHTML = `<div class="rail-empty"><span class="glyph">🖍</span>
        No highlights yet.<br>Select any passage in the article<br>and pick a color.</div>`;
      return;
    }
    body.innerHTML = hls.map(h=>`
      <div class="hl-row" style="--hlc:${COLORS[h.color]}" onclick="jumpToHl('${h.id}')">
        <div class="q">${esc(h.text)}</div>
        <div class="foot"><span>¶ ${h.para+1}</span><span>${fmtDate(h.created)}</span></div>
      </div>`).join('');
  }
}

function onStickyClick(e, noteId){
  if(e.target.closest('textarea') || e.target.closest('.del')) return;
  const n = current.notes.find(x=>x.id===noteId);
  if(n && n.hlId){ jumpToHl(n.hlId); }
  editNote(noteId);
}

function editNote(noteId, focusOnly){
  const n = current.notes.find(x=>x.id===noteId); if(!n) return;
  const bodyEl = document.getElementById('nb-'+noteId);
  if(!bodyEl || bodyEl.querySelector('textarea')) {
    const ta = bodyEl && bodyEl.querySelector('textarea'); if(ta) ta.focus();
    return;
  }
  bodyEl.innerHTML = `<textarea>${esc(n.text)}</textarea>`;
  const ta = bodyEl.querySelector('textarea');
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
  const save = async ()=>{
    n.text = ta.value.trim();
    if(n.hlId){ const h = current.highlights.find(x=>x.id===n.hlId); if(h) redrawPara(h.para); }
    await persist(); drawRail();
  };
  ta.addEventListener('blur', save);
  ta.addEventListener('keydown', e=>{
    if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) ta.blur();
  });
  ta.addEventListener('click', e=>e.stopPropagation());
}

async function addFreeNote(){
  const n = {id:uid(), hlId:null, text:'', created:Date.now()};
  current.notes.push(n);
  await persist(); drawRail();
  editNote(n.id);
}

async function deleteNote(noteId){
  const n = current.notes.find(x=>x.id===noteId);
  current.notes = current.notes.filter(x=>x.id!==noteId);
  if(n && n.hlId){ const h = current.highlights.find(x=>x.id===n.hlId); if(h) redrawPara(h.para); }
  await persist(); drawRail();
}

function jumpToHl(hlId){
  const mk = document.querySelector(`mark[data-hl="${hlId}"]`);
  if(!mk) return;
  mk.scrollIntoView({behavior:'smooth', block:'center'});
  mk.classList.remove('flash'); void mk.offsetWidth; mk.classList.add('flash');
}

/* ---------- export ---------- */
async function exportBackup(){
  try{
    const data = {app:'lilys-notetaker', version:1, exported:Date.now(), index, articles:{}};
    for(const a of index){
      data.articles[a.id] = await sGet('lilysnotes:article:'+a.id);
    }
    const stamp = new Date().toISOString().slice(0,10);
    const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const el = document.createElement('a');
    el.href = url; el.download = `lilys-notetaker-backup-${stamp}.json`;
    document.body.appendChild(el); el.click(); el.remove();
    URL.revokeObjectURL(url);
    toast(`Backup downloaded — ${index.length} article${index.length===1?'':'s'} ✓`);
  }catch(e){
    console.error(e); toast('Export failed — see console for details');
  }
}

function importBackup(){
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = '.json,application/json';
  fi.onchange = async ()=>{
    const f = fi.files[0]; if(!f) return;
    try{
      const data = JSON.parse(await f.text());
      if(data.app !== 'lilys-notetaker' || !Array.isArray(data.index) || !data.articles){
        toast('That file isn\u2019t a Lily\u2019s Notetaker backup'); return;
      }
      let added = 0, skipped = 0;
      for(const meta of data.index){
        if(index.find(a=>a.id===meta.id)){ skipped++; continue; }
        const art = data.articles[meta.id];
        if(!art || !Array.isArray(art.paras)){ skipped++; continue; }
        index.push(meta);
        await sSet('lilysnotes:article:'+meta.id, art);
        added++;
      }
      await saveIndex();
      renderLibrary();
      toast(`Imported ${added} article${added===1?'':'s'}${skipped?` · ${skipped} already here`:''} ✓`);
    }catch(e){
      console.error(e); toast('Could not read that backup file');
    }
  };
  fi.click();
}

async function copyNotesMarkdown(){
  const m = current.meta;
  let md = `# ${m.title}\n${m.source?`*${m.source}*\n`:''}\n## Highlights\n`;
  const hls = [...current.highlights].sort((a,b)=> a.para-b.para || a.start-b.start);
  if(!hls.length) md += '_none yet_\n';
  hls.forEach(h=>{
    md += `\n> ${h.text}\n`;
    const note = current.notes.find(n=>n.hlId===h.id && n.text);
    if(note) md += `\n  - 📝 ${note.text}\n`;
  });
  const free = current.notes.filter(n=>!n.hlId && n.text);
  if(free.length){
    md += `\n## Notes\n`;
    free.forEach(n=> md += `\n- ${n.text}\n`);
  }
  try{
    await navigator.clipboard.writeText(md);
    toast('Notes copied as Markdown ✓');
  }catch(e){
    toast('Could not access clipboard');
  }
}
